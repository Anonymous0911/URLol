<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - URLol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #040914;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Upgraded Premium Glassmorphism */
        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        /* Subtle lift on hover for interactive cards */
        .glass-card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .neon-text { text-shadow: 0 0 20px rgba(56,189,248, 0.6); }

        /* Custom Scrollbar for the table */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }

        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.9); }
        }
        .toast-enter { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: fadeOut 0.4s ease forwards; }
    </style>
</head>
<body class="text-slate-300 min-h-screen pb-12 selection:bg-sky-500/30 relative">

<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-sky-600/10 rounded-full blur-[120px] mix-blend-screen"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[600px] h-[600px] bg-emerald-600/10 rounded-full blur-[150px] mix-blend-screen"></div>
</div>

<nav class="border-b border-white/5 bg-[#040914]/70 backdrop-blur-xl sticky top-0 z-50 shadow-lg shadow-black/20">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500 neon-text transition-all hover:opacity-80">
            URLol
        </a>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center gap-3 bg-slate-800/50 px-4 py-1.5 rounded-full border border-white/5">
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                <span class="text-sm font-medium text-slate-400">Hi, <span class="text-white font-bold" th:text="${name}">User</span></span>
            </div>
            <a href="/" class="text-sm text-slate-400 hover:text-sky-400 transition-colors font-medium">Create Link</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="text-sm font-semibold bg-white/5 hover:bg-red-500/10 text-slate-300 hover:text-red-400 transition-all border border-white/5 hover:border-red-500/30 px-4 py-2 rounded-lg flex items-center gap-2">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="max-w-6xl mx-auto px-6 mt-10 space-y-8 relative z-10">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass-card glass-card-hover rounded-3xl p-6 flex items-center gap-5 relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-r from-sky-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            <div class="p-4 bg-gradient-to-br from-sky-500/20 to-blue-600/20 rounded-2xl text-sky-400 border border-sky-500/20 shadow-[0_0_15px_rgba(56,189,248,0.2)]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
            </div>
            <div>
                <p class="text-sm text-slate-400 font-semibold uppercase tracking-wider mb-1">Total Links Active</p>
                <p class="text-4xl font-extrabold text-white tracking-tight" th:text="${#lists.size(links)}">0</p>
            </div>
        </div>

        <div class="glass-card glass-card-hover rounded-3xl p-6 flex items-center gap-5 relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            <div class="p-4 bg-gradient-to-br from-emerald-500/20 to-teal-600/20 rounded-2xl text-emerald-400 border border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            </div>
            <div>
                <p class="text-sm text-slate-400 font-semibold uppercase tracking-wider mb-1">Network Clicks</p>
                <p class="text-4xl font-extrabold text-white tracking-tight" th:text="${totalClicks}">0</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 pb-8">

        <div class="xl:col-span-1">
            <div class="glass-card p-6 sm:p-8 rounded-3xl h-full">
                <h3 class="text-lg font-bold text-white mb-6 flex items-center gap-2 tracking-tight">
                    <div class="p-2 bg-sky-500/10 rounded-lg">
                        <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    Security Settings
                </h3>

                <div th:if="${error}" class="p-4 bg-red-500/10 text-red-400 rounded-2xl border border-red-500/30 text-sm mb-6 font-medium" th:text="${error}"></div>
                <div th:if="${message}" class="p-4 bg-emerald-500/10 text-emerald-400 rounded-2xl border border-emerald-500/30 text-sm mb-6 font-medium" th:text="${message}"></div>

                <form action="/update-password" method="post" class="flex flex-col gap-4">
                    <input type="password" name="currentPassword" required placeholder="Current Password"
                           class="w-full bg-[#0a0f1c]/80 border border-slate-700/50 rounded-xl px-5 py-3.5 text-white placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/50 transition shadow-inner text-sm">

                    <input type="password" name="newPassword" required placeholder="New Password" minlength="6"
                           class="w-full bg-[#0a0f1c]/80 border border-slate-700/50 rounded-xl px-5 py-3.5 text-white placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/50 transition shadow-inner text-sm">

                    <button type="submit" class="mt-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold px-6 py-3.5 rounded-xl transition-all border border-slate-600/50 hover:border-slate-500 text-sm shadow-lg hover:-translate-y-0.5">
                        Update Password
                    </button>
                </form>
            </div>
        </div>

        <div class="xl:col-span-2">
            <div class="glass-card rounded-3xl overflow-hidden h-full flex flex-col">
                <div class="px-8 py-6 border-b border-white/5 bg-white/[0.02] flex justify-between items-center backdrop-blur-md">
                    <h3 class="text-lg font-bold text-white tracking-tight">Manage Links</h3>
                    <span class="text-xs font-bold uppercase tracking-wider text-sky-400 bg-sky-400/10 px-3 py-1.5 rounded-full" th:text="${#lists.size(links)} + ' Links'"></span>
                </div>

                <div class="overflow-x-auto flex-grow p-4 sm:p-6">
                    <table class="w-full text-left border-collapse">
                        <thead>
                        <tr class="text-xs tracking-wider text-slate-400 uppercase border-b border-slate-800">
                            <th class="px-4 pb-4 font-semibold">Short Link</th>
                            <th class="px-4 pb-4 font-semibold hidden md:table-cell">Target</th>
                            <th class="px-4 pb-4 font-semibold text-center">Clicks</th>
                            <th class="px-4 pb-4 font-semibold text-right">Actions</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/50">

                        <tr th:each="link : ${links}" class="hover:bg-white/[0.03] transition-colors group">
                            <td class="px-4 py-5">
                                <div class="flex items-center gap-3">
                                    <a th:href="${@environment.getProperty('app.base-url', 'http://localhost:8080')} + '/' + ${link.shortCode}" target="_blank"
                                       class="text-sky-400 hover:text-sky-300 font-mono font-bold truncate max-w-[150px] sm:max-w-[200px]"
                                       th:id="|link-${link.shortCode}|"
                                       th:text="${@environment.getProperty('app.base-url', 'http://localhost:8080')} + '/' + ${link.shortCode}"></a>

                                    <button th:data-copy-id="|link-${link.shortCode}|"
                                            onclick="copyLink(this.getAttribute('data-copy-id'))"
                                            class="text-slate-500 hover:text-sky-400 bg-slate-800/50 hover:bg-sky-500/20 transition-all p-1.5 rounded-md opacity-0 group-hover:opacity-100 focus:opacity-100 border border-transparent hover:border-sky-500/30" title="Copy to clipboard">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                    </button>
                                </div>
                            </td>

                            <td class="px-4 py-5 hidden md:table-cell">
                                <div class="text-slate-400 text-sm truncate max-w-[200px] xl:max-w-[250px]" th:text="${link.originalUrl}"></div>
                            </td>

                            <td class="px-4 py-5 text-center">
                                <span class="inline-flex items-center justify-center min-w-[2.5rem] px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 font-bold text-sm border border-emerald-500/20 shadow-[0_0_10px_rgba(16,185,129,0.1)]" th:text="${link.clickCount}"></span>
                            </td>

                            <td class="px-4 py-5 text-right">
                                <a th:href="@{|/qr/${link.shortCode}|}" target="_blank"
                                   class="inline-flex items-center gap-1.5 bg-slate-800/80 hover:bg-slate-700 text-slate-200 text-xs font-semibold px-3 py-2 rounded-lg transition-all border border-slate-600 hover:border-slate-500 hover:-translate-y-0.5">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                                    QR
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(links)}">
                            <td colspan="4" class="px-4 py-20 text-center">
                                <div class="flex flex-col items-center justify-center text-slate-500 animate-pulse">
                                    <div class="p-4 bg-slate-800/50 rounded-full mb-4 border border-slate-700/50">
                                        <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                    </div>
                                    <p class="text-lg font-bold text-slate-300">No links generated yet</p>
                                    <p class="text-sm mt-1 text-slate-400">Head back to the home page to create your first link!</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none">
    <div th:if="${message}" class="toast-enter pointer-events-auto flex items-center gap-3 bg-emerald-900/90 border border-emerald-500/50 text-emerald-100 px-5 py-4 rounded-2xl shadow-[0_10px_40px_rgba(16,185,129,0.2)] backdrop-blur-xl">
        <div class="p-1.5 bg-emerald-500/20 rounded-full">
            <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span class="font-medium text-sm" th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="toast-enter pointer-events-auto flex items-center gap-3 bg-red-900/90 border border-red-500/50 text-red-100 px-5 py-4 rounded-2xl shadow-[0_10px_40px_rgba(239,68,68,0.2)] backdrop-blur-xl">
        <div class="p-1.5 bg-red-500/20 rounded-full">
            <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <span class="font-medium text-sm" th:text="${error}"></span>
    </div>
</div>

<script>
    // Auto-dismiss backend toasts after 4 seconds
    setTimeout(() => {
        const toasts = document.querySelectorAll('.toast-enter');
        toasts.forEach(toast => {
            toast.classList.replace('toast-enter', 'toast-exit');
            setTimeout(() => toast.remove(), 400);
        });
    }, 4000);

    // Copy to clipboard functionality
    function copyLink(elementId) {
        const linkText = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(linkText).then(() => {
            showFrontendToast('Link copied to clipboard!');
        });
    }

    // Frontend dynamically generated toasts
    function showFrontendToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast-enter pointer-events-auto flex items-center gap-3 bg-slate-900/95 border border-sky-500/40 text-sky-100 px-5 py-4 rounded-2xl shadow-[0_10px_40px_rgba(56,189,248,0.2)] backdrop-blur-xl';
        toast.innerHTML = `
            <div class="p-1.5 bg-sky-500/20 rounded-full">
                <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </div>
            <span class="font-medium text-sm">${message}</span>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.replace('toast-enter', 'toast-exit');
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }
</script>
</body>
</html>
