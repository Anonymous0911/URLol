<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log In - URLol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out' },
                    keyframes: { fadeInUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
</head>
<body class="relative min-h-screen flex items-center justify-center text-slate-200 antialiased selection:bg-sky-500 selection:text-white bg-[#040914] overflow-hidden px-4">

<div class="fixed inset-0 z-0 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-sky-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
</div>

<div class="relative z-10 w-full max-w-md animate-fade-in-up">

    <div class="text-center mb-8">
        <a href="/" class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500 hover:opacity-80 transition-opacity">
            URLol
        </a>
        <h2 class="mt-4 text-2xl font-bold text-white">Welcome back</h2>
        <p class="text-sm text-slate-400 mt-2">Log in to manage your custom links.</p>
    </div>

    <div th:if="${param.error}" class="mb-6 rounded-xl border border-red-500/50 bg-red-500/10 p-4 backdrop-blur-sm text-center">
        <p class="text-sm font-medium text-red-400">Invalid username or password.</p>
    </div>

    <div th:if="${param.logout}" class="mb-6 rounded-xl border border-emerald-500/50 bg-emerald-500/10 p-4 backdrop-blur-sm text-center">
        <p class="text-sm font-medium text-emerald-400">You have been successfully logged out.</p>
    </div>

    <div class="glass-card rounded-3xl p-6 sm:p-8">

        <div class="space-y-3 mb-6">
            <a href="/oauth2/authorization/google" class="flex w-full items-center justify-center gap-3 rounded-xl bg-white text-slate-900 px-4 py-3 text-sm font-bold shadow-lg transition-all hover:bg-slate-100 hover:scale-[1.02] active:scale-[0.98]">
                <svg class="h-5 w-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </a>
            <a href="/oauth2/authorization/github" class="flex w-full items-center justify-center gap-3 rounded-xl bg-[#24292F] text-white px-4 py-3 text-sm font-bold shadow-lg transition-all hover:bg-[#1f2328] hover:scale-[1.02] active:scale-[0.98] border border-white/10">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"></path></svg>
                Continue with GitHub
            </a>
        </div>

        <div class="relative flex items-center py-2 mb-6">
            <div class="flex-grow border-t border-slate-700/50"></div>
            <span class="mx-4 shrink-0 text-xs text-slate-500 font-medium uppercase tracking-wider">Or</span>
            <div class="flex-grow border-t border-slate-700/50"></div>
        </div>

        <form action="/login" method="POST" class="space-y-4">

            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Email or Username</label>
                <input type="text" id="username" name="username"
                       class="block w-full rounded-xl border border-white/10 bg-[#0a0f1c]/80 py-3 px-4 text-white placeholder-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition-all shadow-inner"
                       placeholder="you@example.com" required>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" id="password" name="password"
                       class="block w-full rounded-xl border border-white/10 bg-[#0a0f1c]/80 py-3 px-4 text-white placeholder-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition-all shadow-inner"
                       placeholder="••••••••" required>
            </div>

            <div class="flex items-center justify-between mt-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="remember-me" class="w-4 h-4 rounded border-white/10 bg-[#0a0f1c]/80 text-sky-500 focus:ring-sky-500/50 focus:ring-offset-0">
                    <span class="text-sm font-medium text-slate-400 select-none">Remember me</span>
                </label>
            </div>

            <button type="submit"
                    class="mt-6 flex w-full items-center justify-center rounded-xl bg-gradient-to-r from-sky-500 to-blue-600 px-4 py-3 text-sm font-bold text-white shadow-lg transition-all hover:scale-[1.02] hover:shadow-sky-500/25 active:scale-[0.98]">
                Log In
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400">
            Don't have an account?
            <a href="/register" class="font-medium text-sky-400 hover:text-sky-300 transition-colors">Sign up free</a>
        </div>
    </div>
</div>
</body>
</html>
