<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - URLol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white min-h-screen p-8">
<div class="max-w-4xl mx-auto space-y-8">

    <div class="flex justify-between items-center glass p-6 rounded-xl">
        <h1 class="text-3xl font-bold text-sky-400">Welcome, <span th:text="${name}">User</span></h1>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="px-4 py-2 bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/50 rounded-lg transition">Logout</button>
        </form>
    </div>

    <div th:if="${message}" class="p-4 glass border-green-500/50 text-green-400 rounded-xl" th:text="${message}"></div>
    <div th:if="${error}" class="p-4 glass border-red-500/50 text-red-400 rounded-xl" th:text="${error}"></div>

    <div class="glass p-6 rounded-xl">
        <h2 class="text-xl font-semibold mb-4">Create New Link</h2>
        <form action="/shorten" method="post" class="space-y-4">
            <div>
                <input type="url" name="originalUrl" required placeholder="https://your-long-url.com"
                       class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400 transition">
            </div>
            <div class="flex gap-4">
                <input type="text" name="customAlias" placeholder="Custom alias (optional)" pattern="[a-zA-Z0-9_-]+"
                       title="Alphanumeric characters, underscores, and hyphens only"
                       class="flex-1 bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400 transition">
                <button type="submit" class="bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold px-8 py-3 rounded-lg transition shadow-[0_0_15px_rgba(56,189,248,0.4)]">
                    Shorten
                </button>
            </div>
        </form>
    </div>

    <div class="glass rounded-xl overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-slate-800/50 border-b border-slate-700">
                <th class="p-4 font-semibold text-gray-300">Short Link</th>
                <th class="p-4 font-semibold text-gray-300">Original URL</th>
                <th class="p-4 font-semibold text-gray-300 text-center">Clicks </th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-700/50">
            <tr th:each="link : ${links}" class="hover:bg-slate-800/30 transition">
                <td class="p-4">
                    <a th:href="@{'/' + ${link.shortCode}}" target="_blank" class="text-sky-400 hover:text-sky-300 font-mono"
                       th:text="'localhost:8080/' + ${link.shortCode}"></a>
                </td>
                <td class="p-4 text-gray-400 truncate max-w-xs" th:text="${link.originalUrl}"></td>
                <td class="p-4 text-center font-bold text-emerald-400" th:text="${link.clickCount}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(links)}">
                <td colspan="3" class="p-8 text-center text-gray-500 italic">No links generated yet. Start shrinking!</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
