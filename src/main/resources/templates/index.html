<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>URLol - Premium URL Shortener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in-up': 'fadeInUp 0.5s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
</head>
<body class="relative min-h-screen font-sans text-slate-200 antialiased selection:bg-cyan-500 selection:text-white bg-slate-950 overflow-x-hidden">

<div class="fixed inset-0 z-0 pointer-events-none">
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
</div>

<header class="relative z-50 w-full border-b border-white/5 bg-slate-950/50 backdrop-blur-xl">
  <div class="mx-auto flex h-16 sm:h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    <a href="/" class="group flex items-center gap-2 text-2xl font-black tracking-tighter text-white">
                <span class="bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent group-hover:from-cyan-300 group-hover:to-blue-400 transition-all duration-300">
                    URLol
                </span>
    </a>

    <nav class="flex items-center gap-3 sm:gap-6">
      <th:block sec:authorize="isAuthenticated()">
        <a href="/profile" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">My Profile</a>
        <form th:action="@{/logout}" method="post" class="m-0">
          <button type="submit" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Logout</button>
        </form>
      </th:block>
      <th:block sec:authorize="isAnonymous()">
        <a href="/login" class="hidden sm:inline-block text-sm font-medium text-slate-400 hover:text-white transition-colors">Log In</a>
        <a href="/register" class="rounded-full bg-white/10 px-5 py-2 text-sm font-semibold text-white backdrop-blur-md transition-all hover:bg-white/20 active:scale-95">
          Sign Up Free
        </a>
      </th:block>
    </nav>
  </div>
</header>

<main class="relative z-10 flex flex-col items-center justify-center px-4 pt-12 pb-24 sm:pt-20 lg:pt-32">

  <div class="w-full max-w-3xl text-center animate-fade-in-up">
    <h1 class="mx-auto max-w-4xl font-display text-5xl font-extrabold tracking-tight text-white sm:text-6xl md:text-7xl lg:text-8xl">
      Make it <span class="relative whitespace-nowrap text-cyan-400">short.</span>
    </h1>
    <p class="mx-auto mt-6 max-w-2xl text-lg tracking-tight text-slate-400 sm:text-xl">
      Paste your long, bulky links below and instantly generate a beautifully tiny, tracking-enabled URL.
    </p>
  </div>

  <div class="mt-10 sm:mt-16 w-full max-w-4xl animate-fade-in-up" style="animation-delay: 0.1s;">
    <div class="rounded-3xl border border-white/10 bg-white/5 p-4 sm:p-8 backdrop-blur-xl shadow-2xl shadow-black/50">

      <form action="/shorten" method="POST" class="flex flex-col gap-4 md:flex-row md:items-stretch">

        <div class="relative flex-grow">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
            <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
          </div>
          <input type="url" name="originalUrl" placeholder="https://your-very-long-url.com" required
                 class="block w-full rounded-2xl border border-white/10 bg-black/40 py-4 pl-12 pr-4 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all text-base sm:text-lg">
        </div>

        <div class="relative w-full md:w-56 shrink-0">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
            <span class="text-slate-500 font-medium select-none text-sm">ur.lol/</span>
          </div>
          <input type="text" name="customAlias" placeholder="alias"
                 class="block w-full rounded-2xl border border-white/10 bg-black/40 py-4 pl-16 pr-4 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all text-base sm:text-lg">
        </div>

        <button type="submit"
                class="group relative flex w-full md:w-auto shrink-0 items-center justify-center rounded-2xl bg-gradient-to-r from-cyan-500 to-blue-600 px-8 py-4 text-lg font-bold text-white shadow-lg transition-all hover:scale-[1.02] hover:shadow-cyan-500/25 active:scale-[0.98]">
          <span>Shorten</span>
          <svg class="ml-2 h-5 w-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </form>
    </div>
  </div>

  <div th:if="${shortUrl != null}" class="mt-8 w-full max-w-4xl animate-fade-in-up" style="animation-delay: 0.2s;">
    <div class="relative overflow-hidden rounded-3xl border border-cyan-500/30 bg-cyan-950/20 p-6 sm:p-8 backdrop-blur-md">

      <div class="absolute -right-10 -top-10 h-32 w-32 animate-pulse-slow rounded-full bg-cyan-500/20 blur-2xl"></div>

      <div class="relative flex flex-col md:flex-row md:items-center justify-between gap-6">

        <div class="flex-grow min-w-0">
          <p class="mb-1 text-xs font-bold tracking-widest text-cyan-500 uppercase">Your short link is ready</p>
          <a th:href="${shortUrl}" target="_blank" class="block truncate text-2xl sm:text-3xl font-extrabold text-white hover:text-cyan-400 transition-colors">
            <span th:text="${shortUrl}">ur.lol/alias</span>
          </a>
          <p class="mt-2 truncate text-sm text-slate-400 max-w-[90%]" th:text="${originalUrl}">
            https://original-url.com...
          </p>
        </div>

        <div class="flex shrink-0 flex-col sm:flex-row gap-3">
          <button type="button" onclick="copyToClipboard()" id="copyBtn"
                  class="flex items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/5 px-6 py-3 text-sm font-semibold text-white backdrop-blur-sm transition-all hover:bg-white/10 active:scale-95">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <span id="copyText">Copy Link</span>
          </button>

          <button type="button"
                  class="flex items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/5 px-6 py-3 text-sm font-semibold text-white backdrop-blur-sm transition-all hover:bg-white/10 active:scale-95">
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M3 3h8v8H3zm2 2v4h4V5zm8-2h8v8h-8zm2 2v4h4V5zM3 13h8v8H3zm2 2v4h4v-4zm13-2h2v2h-2zm-2 2h2v2h-2zm2 2h2v2h-2zm-2 2h2v2h-2zm-4-6h2v2h-2zm2 2h2v2h-2zm-2 2h2v2h-2zm2 2h2v2h-2z"/></svg>
            <span>QR Code</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</main>

<script th:inline="javascript">
  function copyToClipboard() {
    const shortUrl = /*[[${shortUrl}]]*/ 'fallback-url';

    if (shortUrl && shortUrl !== 'fallback-url') {
      navigator.clipboard.writeText(shortUrl).then(() => {
        const btn = document.getElementById('copyBtn');
        const textSpan = document.getElementById('copyText');

        // Success State
        btn.classList.add('bg-cyan-500/20', 'border-cyan-500/50', 'text-cyan-400');
        textSpan.innerText = 'Copied!';

        // Revert after 2 seconds
        setTimeout(() => {
          btn.classList.remove('bg-cyan-500/20', 'border-cyan-500/50', 'text-cyan-400');
          textSpan.innerText = 'Copy Link';
        }, 2000);
      });
    }
  }
</script>
</body>
</html>
