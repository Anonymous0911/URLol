<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>URLol - Premium URL Shortener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-card {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out', 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' },
          keyframes: { fadeInUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
        }
      }
    }
  </script>
</head>
<body class="relative min-h-screen text-slate-200 antialiased selection:bg-sky-500 selection:text-white bg-[#040914] overflow-x-hidden">

<div class="fixed inset-0 z-0 pointer-events-none">
  <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-sky-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
</div>

<header class="relative z-50 w-full border-b border-white/5 bg-[#040914]/50 backdrop-blur-xl">
  <div class="mx-auto flex h-16 sm:h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    <a href="/" class="group flex items-center gap-2 text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500 hover:opacity-80 transition-all">
      URLol
    </a>

    <nav class="flex items-center gap-3 sm:gap-6">
      <th:block sec:authorize="isAuthenticated()">
        <a href="/profile" class="text-sm font-medium text-slate-400 hover:text-sky-400 transition-colors">My Dashboard</a>
        <form th:action="@{/logout}" method="post" class="m-0">
          <button type="submit" class="text-sm font-semibold bg-white/5 hover:bg-red-500/10 text-slate-300 hover:text-red-400 border border-white/5 hover:border-red-500/30 px-4 py-2 rounded-lg transition-all">Logout</button>
        </form>
      </th:block>
      <th:block sec:authorize="isAnonymous()">
        <a href="/login" class="hidden sm:inline-block text-sm font-medium text-slate-400 hover:text-white transition-colors">Log In</a>
        <a href="/register" class="rounded-xl bg-gradient-to-r from-sky-500 to-blue-600 px-5 py-2.5 text-sm font-bold text-white shadow-lg transition-all hover:scale-[1.02] hover:shadow-sky-500/25 active:scale-[0.98]">
          Sign Up Free
        </a>
      </th:block>
    </nav>
  </div>
</header>

<main class="relative z-10 mx-auto max-w-4xl px-4 pt-12 pb-24 sm:pt-20 lg:pt-32">

  <div class="w-full text-center animate-fade-in-up mb-12">
    <h1 class="mx-auto max-w-4xl font-extrabold tracking-tight text-white text-5xl sm:text-6xl md:text-7xl lg:text-8xl">
      Make it <span class="relative whitespace-nowrap text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500">short.</span>
    </h1>
    <p class="mx-auto mt-6 max-w-2xl text-lg text-slate-400">
      Paste your long, bulky links below and instantly generate a beautifully tiny, tracking-enabled URL.
    </p>
  </div>

  <div class="glass-card rounded-3xl p-6 sm:p-8 relative overflow-hidden animate-fade-in-up" style="animation-delay: 0.1s;">
    <form action="/shorten" method="POST" class="flex flex-col gap-4 md:flex-row md:items-stretch relative z-10">
      <div class="relative flex-grow group">
        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-500 group-focus-within:text-sky-400 transition-colors">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        </div>
        <input type="url" name="originalUrl" placeholder="https://your-very-long-url.com" required
               class="block w-full rounded-2xl border border-white/10 bg-[#0a0f1c]/80 py-4 pl-12 pr-4 text-white placeholder-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/30 transition-all text-base shadow-inner">
      </div>

      <div class="relative w-full md:w-56 shrink-0">
        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
          <span class="text-slate-500 font-medium text-sm">ur.lol/</span>
        </div>
        <input type="text" name="customAlias" placeholder="alias" pattern="[a-zA-Z0-9_-]+"
               class="block w-full rounded-2xl border border-white/10 bg-[#0a0f1c]/80 py-4 pl-16 pr-4 text-white placeholder-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/30 transition-all text-base shadow-inner">
      </div>

      <button type="submit"
              class="flex w-full md:w-auto shrink-0 items-center justify-center rounded-2xl bg-gradient-to-r from-sky-500 to-blue-600 px-8 py-4 text-lg font-bold text-white shadow-lg transition-all hover:scale-[1.02] hover:shadow-sky-500/25 active:scale-[0.98]">
        Shorten
      </button>
    </form>
  </div>

  <div th:if="${shortUrl != null}" class="mt-8 glass-card rounded-3xl p-6 sm:p-8 relative overflow-hidden animate-fade-in-up" style="animation-delay: 0.2s;">
    <div class="absolute -right-10 -top-10 h-32 w-32 animate-pulse-slow rounded-full bg-sky-500/20 blur-2xl pointer-events-none"></div>
    <div class="relative flex flex-col md:flex-row md:items-center justify-between gap-6 z-10">
      <div class="flex-grow min-w-0">
        <p class="mb-1 text-xs font-bold tracking-widest text-sky-400 uppercase">Your short link is ready</p>
        <a th:href="${shortUrl}" target="_blank" class="block truncate text-2xl sm:text-3xl font-extrabold text-white hover:text-sky-300 transition-colors">
          <span th:text="${shortUrl}">ur.lol/alias</span>
        </a>
        <p class="mt-2 truncate text-sm text-slate-400 max-w-[90%]" th:text="${originalUrl}"></p>
      </div>
      <div class="flex shrink-0 flex-col sm:flex-row gap-3">
        <button type="button" onclick="copyToClipboard()" id="copyBtn"
                class="flex items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/5 px-6 py-3 text-sm font-semibold text-white transition-all hover:bg-white/10 active:scale-95">
          <span id="copyText">Copy Link</span>
        </button>
        <button type="button" class="flex items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/5 px-6 py-3 text-sm font-semibold text-white transition-all hover:bg-white/10 active:scale-95">
          QR Code
        </button>
      </div>
    </div>
  </div>

</main>

<script th:inline="javascript">
  function copyToClipboard() {
    const shortUrl = /*[[${shortUrl}]]*/ 'fallback-url';
    if (shortUrl && shortUrl !== 'fallback-url') {
      navigator.clipboard.writeText(shortUrl).then(() => {
        const btn = document.getElementById('copyBtn');
        const textSpan = document.getElementById('copyText');

        btn.classList.add('bg-sky-500/20', 'border-sky-500/50', 'text-sky-400');
        textSpan.innerText = 'Copied!';

        setTimeout(() => {
          btn.classList.remove('bg-sky-500/20', 'border-sky-500/50', 'text-sky-400');
          textSpan.innerText = 'Copy Link';
        }, 2000);
      });
    }
  }
</script>
</body>
</html>
