<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>URLol - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-text { text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">
<div class="glass p-10 rounded-2xl shadow-2xl max-w-md w-full space-y-6">
  <div class="text-center space-y-2">
    <h1 class="text-5xl font-extrabold tracking-wider text-sky-400 neon-text">URLol</h1>
<!--    <p class="text-gray-300">Condense your links. Track your impact.</p>-->
  </div>

  <div th:if="${param.error}" class="p-3 bg-red-500/20 text-red-300 rounded border border-red-500/50 text-center">
    Invalid credentials or link not found.
  </div>
  <div th:if="${message}" class="p-3 bg-green-500/20 text-green-300 rounded border border-green-500/50 text-center" th:text="${message}"></div>

  <form action="/login" method="post" class="space-y-4">
    <div>
      <input type="email" name="username" required placeholder="Email Address"
             class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-400 transition">
    </div>
    <div>
      <input type="password" name="password" required placeholder="Password"
             class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-400 transition">
    </div>

    <div class="flex items-center">
      <input type="checkbox" id="remember-me" name="remember-me" class="w-4 h-4 text-sky-500 bg-slate-800 border-slate-600 rounded focus:ring-sky-500 focus:ring-2">
      <label for="remember-me" class="ml-2 text-sm text-gray-300">Remember me for 7 days</label>
    </div>

    <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold py-3 rounded-lg transition shadow-[0_0_15px_rgba(56,189,248,0.4)]">
      Login
    </button>
  </form>

  <div class="relative flex py-2 items-center">
    <div class="flex-grow border-t border-slate-600"></div>
    <span class="flex-shrink-0 mx-4 text-slate-400 text-sm">OR</span>
    <div class="flex-grow border-t border-slate-600"></div>
  </div>

  <a href="/oauth2/authorization/github"
     class="flex justify-center items-center w-full py-3 px-4 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-lg border border-slate-600 transition">
    <svg class="w-5 h-5 inline mr-2" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>
    Continue with GitHub
  </a>

  <p class="text-center text-slate-400 text-sm mt-4">
    Don't have an account? <a href="/register" class="text-sky-400 hover:underline">Sign up</a>
  </p>
</div>
</body>
</html>
