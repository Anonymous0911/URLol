<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up - URLol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="relative min-h-screen flex items-center justify-center font-sans text-slate-200 antialiased selection:bg-cyan-500 selection:text-white bg-slate-950 overflow-hidden px-4">

<div class="fixed inset-0 z-0 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[120px] mix-blend-screen hidden sm:block"></div>
</div>

<div class="relative z-10 w-full max-w-md animate-fade-in-up">

    <div class="text-center mb-8">
        <a href="/" class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
            URLol
        </a>
        <h2 class="mt-4 text-2xl font-bold text-white">Create your account</h2>
        <p class="text-sm text-slate-400 mt-2">Join to manage and track your custom links.</p>
    </div>

    <div class="rounded-3xl border border-white/10 bg-white/5 p-6 sm:p-8 backdrop-blur-xl shadow-2xl shadow-black/50">

        <form action="/register" method="POST" class="space-y-5">

            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Choose a Username</label>
                <input type="text" id="username" name="username"
                       class="block w-full rounded-xl border border-white/10 bg-black/40 py-3 px-4 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all"
                       placeholder="e.g. url_wizard" required>

                <div id="username-feedback" class="text-xs mt-2 transition-all h-4 font-medium"></div>
                <div id="suggestions-container" class="hidden mt-2 flex flex-wrap gap-2"></div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
                <input type="email" id="email" name="email"
                       class="block w-full rounded-xl border border-white/10 bg-black/40 py-3 px-4 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all"
                       placeholder="you@example.com" required>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" id="password" name="password"
                       class="block w-full rounded-xl border border-white/10 bg-black/40 py-3 px-4 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" disabled
                    class="mt-6 flex w-full items-center justify-center rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 px-4 py-3 text-sm font-bold text-white shadow-lg transition-all hover:scale-[1.02] hover:shadow-cyan-500/25 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
                Sign Up
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400">
            Already have an account?
            <a href="/login" class="font-medium text-cyan-400 hover:text-cyan-300 transition-colors">Log in here</a>
        </div>
    </div>
</div>

<script>
    const usernameInput = document.getElementById('username');
    const feedback = document.getElementById('username-feedback');
    const suggestionsContainer = document.getElementById('suggestions-container');
    const submitBtn = document.getElementById('submit-btn');

    usernameInput.addEventListener('input', async (e) => {
        const username = e.target.value.trim();

        if (username.length < 3) {
            feedback.textContent = 'Username must be at least 3 characters.';
            feedback.className = 'text-xs mt-2 text-slate-500';
            suggestionsContainer.classList.add('hidden');
            submitBtn.disabled = true;
            return;
        }

        try {
            const response = await fetch(`/api/users/check-username?username=${username}`);
            const data = await response.json();

            if (data.available) {
                feedback.textContent = '✅ Username is available!';
                feedback.className = 'text-xs mt-2 text-cyan-400';
                suggestionsContainer.classList.add('hidden');
                submitBtn.disabled = false;
            } else {
                feedback.textContent = '❌ Username is taken. Try one of these:';
                feedback.className = 'text-xs mt-2 text-red-400';
                submitBtn.disabled = true;

                suggestionsContainer.innerHTML = data.suggestions.map(suggestion =>
                    `<button type="button" onclick="applySuggestion('${suggestion}')"
                                 class="px-3 py-1 bg-white/5 hover:bg-cyan-500/20 border border-white/10 hover:border-cyan-500/50 text-cyan-300 text-xs rounded-full transition-all backdrop-blur-sm">
                            ${suggestion}
                        </button>`
                ).join('');

                suggestionsContainer.classList.remove('hidden');
            }
        } catch (error) {
            console.error("Error checking username:", error);
        }
    });

    function applySuggestion(suggestion) {
        usernameInput.value = suggestion;
        usernameInput.dispatchEvent(new Event('input'));
    }
</script>
</body>
</html>
